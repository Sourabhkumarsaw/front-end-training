<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice of mini project- student registration form</title>
</head>
<body>
    <h1>Practice of mini project- student registration form</h1>
    <form action="">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required
        placeholder="enter your name"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required
        placeholder="enter your email"><br><br>

        <label for="mobile number">Mobile Number:</label>
        <input type="tel" id="mobile number" name="mobile number" required
        placeholder="enter your mobile number" ><br><br>

        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob" required><br><br>
        <label for="gender">Gender:</label>
        <select id="gender" name="gender" required>
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select><br><br>
        <label for="course">Course:</label>
        <select id="course" name="course" required>
            <option value="">Select Course</option>
            <option value="bca">BCA</option>
            <option value="bsc">BSc</option>
            <option value="ba">BA</option>
            <option value="bcom">BCom</option>
        </select><br><br>
        <label for="message">Message:</label><br>
        <textarea id="message" name="message" rows="4" cols="50"
         placeholder="enter your message"></textarea><br><br>
        <input type="submit" value="Submit">
    </form>
    <footer>
        <p>&copy; 2023 Student Registration Form. All rights reserved.</p>
    </footer>
</body>
</html>
