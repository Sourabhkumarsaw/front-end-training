<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice of input type week </title>
</head>
<body>
    <h1>Practice of input type week </h1>
    <form action="">
        <label for="week">Select a week:</label>
        <input type="week" id="week" name="week" value="2024-W01" 
        min="2024-W01" max="2024-W52">
        <input type="submit" value="Submit" >
    </form>
</body>
</html>
