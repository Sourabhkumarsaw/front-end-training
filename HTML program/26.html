<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice of roswpan and colspan</title>
</head>
<body>
    <h1>Practice of rowspan and colspan</h1>
    <table border="1">
        <tr>
            <td rowspan="2" >Name</td>
            <td  >Age</td>
            <td  >City</td>
        </tr>
        <tr>
            <td  colspan="2">ivy</td>
            <td  >20</td>
            <td  >New York</td>
        </tr>
        <tr>
            <td colspan="3" >Emily</td>
            <td  >25</td>
            <td  >Los Angeles</td>
        </tr>
    </table>
</body>
</html>
