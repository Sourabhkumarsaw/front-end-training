    <title>html practice of ul and ol </title>
</head>
<body>
    <h1> practice of ul and ol</h1>
        <ul>
            <li> this is a first item of unordered list </li>
            <li> this is a second item of unordered list </li>

            <li> this is a first item of ordered list </li>

            <li> this is a third item of ordered list </li>
            </ol>
        </body>
