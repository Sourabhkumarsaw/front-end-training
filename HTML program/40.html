<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice of input date tag</title>
</head>
<body>
    <h1>Input Date Tag Example</h1>
    <label for="birthday">Select your birthday:</label>
    <input type="date" id="birthday" name="birthday"
     min="1900-01-01" max="2024-12-31"> <br><br>

    <label for="appointment">Select an appointment date:</label>
    <input type="date" id="appointment" name="appointment" required> <br><br>
    
    <label for="appointment"> appointment date:</label>
    <input type="date" id="appointment" name="appointment" readonly> 
</body>
</html>
