     <h1>Practice of mark, q, and small and sup</h1>
     <p>Here is a practice of mark, q, and small and sup.</p>
  
    <mark>This is a marked text.</mark>
    <q>This is a quoted text.</q>
    <small> <p>This is a small text.</p> </small>
    <p>This is a normal text.</p>
    <p>This is a <sup>superscript</sup> text.</p>


</body>
