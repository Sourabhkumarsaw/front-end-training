<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice of web page layout 1</title>
</head>
<body>
    <h1>Web Page Layout 1</h1>
    <p>This is a simple web page layout example.</p>
    <table border="1" width="100%" height="600px">
        <tr height="10%">
            <td colspan="2" align="center">&lt;header&gt;</td>
        </tr>

        <tr height="10%">
            <td colspan="2" width="20%" align="center">&lt;nav&gt;</td>
         </tr>
        
        <tr height="60%">
           <td width="75%" height="100%" valign="top" >
           <table border="1" width="100%" height="100%">
                <tr>
                    <td align="center">&lt;article&gt;</td>
                </tr>
                <tr>
                    <td align="center">&lt;section&gt;</td>
                </tr>
                <tr>
                    <td align="center">  &lt;main&gt; </td>
                </tr>
           </table>
           </td>

             <td width="25%" valign="center" align="center">
                 &lt;aside&gt; </td>
            
        </tr>
         
        <tr height="20%">
            <td colspan="2" align="center">&lt;footer&gt;</td>
        </tr>
    </table>

</body>
</html>
