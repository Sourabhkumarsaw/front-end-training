<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice of table tag</title>
</head>
<body>
    <h1> 
        Practice of table tag thead, tbody, tfoot and caption tag
    </h1>
    <table border="1">
        <caption>Table Practice</caption>
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>City</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>emily</td>
                <td>30</td>
                <td>US</td>
            </tr>
            <tr>
                <td>ivy</td>
                <td>25</td>
                <td>USA</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="3">End of Table</td>
            </tr>
        </tfoot>

    </table>

   
</body>
</html>
