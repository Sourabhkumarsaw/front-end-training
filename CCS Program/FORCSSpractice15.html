       click me

 <h2>
        active demo
 </h2>
    <DIV>

       click me
       </button>
    </DIV>
<h2>
        focus demo
</h2>
    <input type="text" class="focus-btn" placeholder="click me">
    <button >
         click me
    </button>
    <h2>
        focus-within demo
    </h2>
    <div class="focus-within-box">
        <label for="name"> 
            <input type="text" placeholder="click me"> click
        </label>
    </div>
   <div >
     <h2> enable and disable</h2>
    <input type="text" class="enable-btn" placeholder="click me" >
    <button class="enable-btn">
            enable button
    </button>
    <input type="text" class="disable-btn" placeholder="click me" >
    <button class="disable-btn" disabled>
            disable button
            </button>

    </div>
     <h2>
        cheaked and unchecked
     </h2>
        <div  class="check-btn">
            <input type="checkbox" id="check1">
            <label for="check1">check me</label>
            <br>
            <input type="checkbox" id="check2" checked>
            <label for="check2">check me</label>
            <input type="radio" id="radio1" name="radio-group">
            <label for="radio1">radio 1</label>
        </div>
        
</body>
